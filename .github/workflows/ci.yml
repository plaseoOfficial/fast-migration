name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Nicht-blockierend (informativ), bis die offenen Link-Fehler sauber sind.
      # Sobald `npm run audit:links` lokal grün ist: continue-on-error entfernen → harter Gate.
      - name: Audit internal links (informativ)
        run: npm run audit:links
        continue-on-error: true
